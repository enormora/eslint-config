---
name: Continuous integration

on:
    push:
        branches: [main]
    pull_request:
        types: [opened, reopened, synchronize]
    merge_group:

permissions: {}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
    run:
        shell: bash

jobs:
    tests:
        runs-on: ubuntu-24.04
        permissions:
            contents: read
        strategy:
            matrix:
                node-version: [24, 26]
        name: Tests with Node.js v${{ matrix.node-version }}
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Use Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version: ${{ matrix.node-version }}
            - name: Install dependencies
              run: npm clean-install
            - name: Static code analysis
              run: npx just lint
            - name: Run tests
              run: npx just test
            - name: Packtory dry-run
              env:
                  NPM_TOKEN: dry-run
              run: npx just packtory-dry-run

    workflow-security:
        runs-on: ubuntu-24.04
        name: Workflow security analysis
        permissions:
            contents: read
            security-events: write
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Run zizmor
              id: zizmor
              uses: zizmorcore/zizmor-action@5f14fd08f7cf1cb1609c1e344975f152c7ee938d # v0.5.6
              with:
                  version: 1.25.2
                  persona: pedantic
                  min-severity: informational
                  min-confidence: low
                  config: .github/zizmor.yml
            - name: Fail if zizmor reported findings
              env:
                  SARIF_FILE: ${{ steps.zizmor.outputs.output-file }}
              run: |
                  count="$(jq '[.runs[].results[]] | length' "$SARIF_FILE")"
                  echo "zizmor findings: $count"
                  test "$count" -eq 0
