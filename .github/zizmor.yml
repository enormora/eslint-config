---
# All 38 audits run with defaults; only the configurable audits are
# overridden below. Persona, severity floor, and confidence floor are
# set on the zizmor CLI in .github/workflows/continuous-integration.yml.

rules:
    unpinned-uses:
        config:
            policies:
                "*": hash-pin

    secrets-outside-env:
        config:
            allow: []
